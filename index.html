<!--
  ================================================================
  TR30 FOIL PERFORMANCE LOG
  ================================================================
  What this file is:
    A single-file internal web app for filling out, saving, editing,
    and printing TR30 foil performance log sheets. It replaces the
    paper form.

  Why it is still one file:
    Intentionally easy to deploy. HTML, CSS, and JS are kept together.

  How data is stored:
    Primary:   foil-api.php on the company server (shared across computers)
    Fallback:  Browser localStorage if the server is unreachable

  Important offline note:
    Local-only data does not automatically sync later. If the server is
    down, work can continue, but that data stays on that browser only.

  Setup:
    Default SERVER_API_URL assumes this HTML file and foil-api.php are
    in the same folder. Change it only if they are hosted separately.
    Example: 'https://atgrecords.triumf.ca/foil-log/foil-api.php'

  Fonts:
    Loaded from Google Fonts (requires internet connection).
    Courier Prime (form text) and Rajdhani (UI labels/buttons).
  ================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foil Performance Log – TR30</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111113; --panel: #18181b;
    --line: #383c46;
    --amber: #f5a623; --amber-dim: #c07820; --amber-glow: rgba(245,166,35,.15);
    --text: #ddd8cc; --muted: #5a5a62;
    --form-bg: #f9f8f5; --ink: #121212; --rule: #c0bbb4;
    --ok: #6fb678; --warn: #d0a443; --idle: #8a8f99; --danger-color: #c55d5d;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: var(--bg);
    background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(245,166,35,.05) 0%, transparent 70%);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
  }

  /* ── App Bar ── */
  .appbar {
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    padding: 8px 20px;
    background: linear-gradient(180deg, #222226, #18181b);
    border-bottom: 1px solid #2a2a2e;
    box-shadow: 0 1px 0 rgba(245,166,35,.3), 0 4px 20px rgba(0,0,0,.4);
  }

  .title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--amber);
    text-transform: uppercase;
    white-space: nowrap;
  }

  .server-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--idle);
    flex: 0 0 auto;
    transition: background .4s;
  }
  .server-dot.online  { background: var(--ok); box-shadow: 0 0 5px rgba(111,182,120,.6); }
  .server-dot.local   { background: var(--warn); box-shadow: 0 0 5px rgba(208,164,67,.5); }

  /* Toggle button groups */
  .toggle-group {
    display: inline-flex;
    border: 1px solid var(--amber-dim);
    border-radius: 4px;
    overflow: hidden;
  }

  .toggle-group button {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    border-right: 1px solid var(--amber-dim);
    border-radius: 0;
    background: transparent;
    color: var(--amber-dim);
    padding: 5px 18px;
    transition: background .15s, color .15s;
  }

  .toggle-group button:last-child { border-right: none; }

  .toggle-group button.active {
    background: linear-gradient(180deg, #f5a623, #d48a10);
    color: #000;
  }

  .toggle-group button:hover:not(.active):not(:disabled) {
    background: var(--amber-glow);
    color: var(--amber);
  }

  /* Generic buttons */
  .btn {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: transparent;
    color: var(--muted);
    padding: 5px 12px;
    white-space: nowrap;
    transition: all .15s;
  }

  .btn:hover:not(:disabled) { border-color: var(--amber-dim); color: var(--amber); background: var(--amber-glow); }
  .btn:disabled { opacity: 0.3; cursor: default; }

  .btn.primary {
    background: linear-gradient(180deg, #f5a623, #d48a10);
    color: #000;
    border-color: var(--amber-dim);
    box-shadow: 0 2px 8px rgba(245,166,35,.2);
  }

  .btn.primary:hover:not(:disabled) {
    background: linear-gradient(180deg, #ffc547, #e8a020);
    box-shadow: 0 4px 14px rgba(245,166,35,.35);
  }

  .btn.danger { border-color: #4a2222; color: var(--danger-color); }
  .btn.danger:hover:not(:disabled) { background: rgba(200,60,60,.1); border-color: #884444; }

  /* Nav cluster */
  .nav-cluster { display: flex; align-items: center; gap: 6px; }
  .nav-info { font-size: 11px; letter-spacing: 1px; color: var(--amber); white-space: nowrap; min-width: 80px; text-align: center; }

  .ro-badge {
    display: none;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--amber);
    border: 1px solid var(--amber-dim);
    border-radius: 3px;
    padding: 3px 8px;
  }
  .ro-badge.show { display: inline-block; }

  .spacer { flex: 1 1 auto; }
  .btn-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

  /* ── Form Sheet ── */
  .stage {

    justify-content: center;
    padding: 36px 20px 60px;

  .sheet {

  .banner {

    margin-bottom: 10px;
    padding: 5px 8px;
    border: 1px solid var(--amber-dim);
    background: linear-gradient(135deg, #2a1e08, #3d2a0e);
    color: var(--amber);

    border-color: #3a9a6a;
    color: #5dca8a;

  .doc-title { text-align: center; font-weight: 700; font-size: 15px; padding: 6px 8px; border-bottom: 1px solid #1a1a1a; }
  .doc-meta { display: flex; justify-content: space-between; padding: 3px 10px; font-size: 11px; }

  /* Form sections */

    border: 1px solid #333338;
    border-radius: 2px;

    text-align: center;
    padding: 3px 0;
    cursor: pointer;

    border-top: 1px solid var(--rule);

  /* Toast */
  #toast {
    position: fixed;
    left: 50%;
    bottom: 24px;
    transform: translateX(-50%) translateY(12px);
    opacity: 0;
    transition: opacity .2s, transform .2s;
    background: #1e1e22;
    color: var(--text);
    border: 1px solid var(--line);

  /* Loading overlay */

    background: rgba(0,0,0,.45);

  /* Print */
  @page { size: letter portrait; margin: 0; }

  @media print {

    body { background: #fff; }
    .stage { padding: 0; }
    .sheet {
      box-shadow: none;
      width: 100%;
      padding: 10px 14px;
      font-size: 10.5px;
      border-top: none;
    }

    .field, input[type="date"], input[type="time"] {
      border-bottom: 1px solid #999;
      opacity: 1 !important;
    }
  }
</style>

<body>

<script>
/*
  ============================================================
  TR30 FOIL PERFORMANCE LOG — Main Script
  ============================================================

  TABLE OF CONTENTS
  -----------------
  1.  Configuration
  2.  App State
  3.  Storage Key Helpers
  4.  Local Storage
  5.  Server API
  6.  Server Status Dot
  7.  Draft: Save, Clear
  8.  Saved Pages: Save
  9.  Reload All Data
  10. Loading Overlay
  11. Empty Form Template
  12. Toast Notification
  13. Render Foil Blocks
  14. Load Form
  15. Read Form
  16. Auto-Fill Next Foil
  17. Autosave
  18. Page Number Helper
  19. Edit Saved Record
  20. View State
  21. Navigation
  22. Switch Machine
  23. Switch Extractor
  24. Delete Page
  25. Save Page and Print PDF
  26. Print Preparation
  27. New Page
  28. Event Wiring
  29. App Startup
  ============================================================
*/


/* ============================================================
   1. CONFIGURATION
   Default assumes HTML and foil-api.php are in the same folder.
   Change to a full URL only if they are hosted separately.
   ============================================================ */
const SERVER_API_URL = './foil-api.php';


/* ============================================================
   2. APP STATE
   ============================================================ */
let activeMachine   = 1;     // 1 = TR30-1, 2 = TR30-2
let activeExtractor = 41;    // 41 = EPR-41, 42 = EPR-42
let pageViewIndex   = 0;     // 0 = draft, 1 = newest saved, 2 = next, etc.
let editModeActive  = false;
let autosaveTimer   = null;
let savedPages      = [];
let currentDraft    = null;


/* ============================================================
   3. STORAGE KEY HELPERS
   Keys follow the pattern: TR301_EPR41_draft / TR301_EPR41_pages
   ============================================================ */
function getLogKey()   { return `TR30${activeMachine}_EPR${activeExtractor}`; }
function getDraftKey() { return `${getLogKey()}_draft`; }
function getPagesKey() { return `${getLogKey()}_pages`; }


/* ============================================================
   4. LOCAL STORAGE
   Used as fallback when the server is offline. Operators are
   never blocked from filling out the form — work continues
   locally if the server is down. Locally-saved data will not
   be visible from other computers and will not sync later.
   ============================================================ */
function localLoad(key) {
  try { return JSON.parse(localStorage.getItem(key)); }
  catch { return null; }
}

function localSave(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); }
  catch { /* storage full or unavailable */ }
}

function localDelete(key) {
  try { localStorage.removeItem(key); }
  catch { /* ignore */ }
}


/* ============================================================
   5. SERVER API
   All requests time out after 5 seconds.
   Returns { ok: true, data } on success, { ok: false } on failure.
   This distinction matters: "server says no draft exists" and
   "server was unreachable" are different situations and must be
   handled differently. See reloadAllData() for the full logic.
   ============================================================ */
async function serverLoad(logKey, type) {
  try {
    const controller = new AbortController();
    const timeout    = setTimeout(() => controller.abort(), 5000);
    const url        = `${SERVER_API_URL}?key=${encodeURIComponent(logKey)}&type=${encodeURIComponent(type)}`;
    const response   = await fetch(url, { signal: controller.signal });
    clearTimeout(timeout);
    if (!response.ok) { return { ok: false }; }
    const json = await response.json();
    // PHP wraps data in { "data": ... }. data can legitimately be null
    // (meaning no file exists yet on the server). That is still a success.
    return { ok: true, data: json.data !== undefined ? json.data : null };
  } catch {
    return { ok: false };
  }
}

async function serverSave(logKey, type, data) {
  try {
    const controller = new AbortController();
    const timeout    = setTimeout(() => controller.abort(), 5000);
    const response   = await fetch(SERVER_API_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ key: logKey, type, data }),
      signal:  controller.signal
    });
    clearTimeout(timeout);
    return response.ok;
  } catch {
    return false;
  }
}


/* ============================================================
   6. SERVER STATUS DOT
   Updated once after both load requests complete in reloadAllData(),
   not after each individual request, to avoid a race condition
   where whichever finishes last determines the final dot color.
   Green = connected, Amber = offline (local only), Grey = checking.
   ============================================================ */
function updateServerDot(status) {
  const dot = document.getElementById('serverDot');
  if (!dot) return;
  dot.className = `server-dot ${status}`;
  dot.title = status === 'online' ? 'Server: connected — data syncing centrally'
            : status === 'local'  ? 'Server: unreachable — saving locally only'
            : 'Server: checking...';
}


/* ============================================================
   7. DRAFT: SAVE, CLEAR
   The draft is the in-progress form. It is saved automatically
   after every keystroke. Server write is fire-and-forget —
   local storage is always written first so work is never lost.
   Loading is handled by reloadAllData().

   clearDraft(): deletes locally, sends null to server.
   The server stores null rather than deleting the file.
   ============================================================ */
function saveDraft(formData) {
  currentDraft = formData;
  localSave(getDraftKey(), formData);          // instant — always happens
  serverSave(getLogKey(), 'draft', formData);  // background — fire and forget
}

function clearDraft() {
  currentDraft = buildEmptyForm();
  localDelete(getDraftKey());
  serverSave(getLogKey(), 'draft', null);
}


/* ============================================================
   8. SAVED PAGES: SAVE
   Saved pages are completed records. Stored as an array,
   newest at the end. Loading is handled by reloadAllData().
   ============================================================ */
async function writeSavedPages(pages) {
  savedPages = pages;
  localSave(getPagesKey(), pages);
  const ok = await serverSave(getLogKey(), 'pages', pages);
  if (!ok) showToast('Saved locally only — server unreachable. Data will not sync automatically.', true);
}


/* ============================================================
   9. RELOAD ALL DATA
   Called when switching machine or extractor. Both requests
   run in parallel. The server dot is updated once after both
   finish, based on whether either request failed.
   ============================================================ */
async function reloadAllData() {
  showLoadingOverlay(true);
  updateServerDot('checking');

  const [draftResult, pagesResult] = await Promise.all([
    serverLoad(getLogKey(), 'draft'),
    serverLoad(getLogKey(), 'pages')
  ]);

  // Update dot once — online only if both requests succeeded
  updateServerDot(draftResult.ok && pagesResult.ok ? 'online' : 'local');

  if (draftResult.ok) {
    if (draftResult.data !== null) {
      currentDraft = draftResult.data;
      localSave(getDraftKey(), draftResult.data);  // keep local in sync
    } else {
      currentDraft = buildEmptyForm();
      localDelete(getDraftKey());  // server has no draft — clear stale local copy
    }
  } else {
    currentDraft = localLoad(getDraftKey()) || buildEmptyForm();
  }

  if (pagesResult.ok) {
    savedPages = Array.isArray(pagesResult.data) ? pagesResult.data : [];
    localSave(getPagesKey(), savedPages);
  } else {
    const local = localLoad(getPagesKey());
    savedPages = Array.isArray(local) ? local : [];
  }

  showLoadingOverlay(false);
}


/* ============================================================
   10. LOADING OVERLAY
   ============================================================ */
function showLoadingOverlay(visible) {
  document.getElementById('loadingOverlay').classList.toggle('show', !!visible);
}


/* ============================================================
   11. EMPTY FORM TEMPLATE
   ============================================================ */
function buildEmptyForm() {
  return {
    totalThickness: '', lotNumber: '', ovenTemp: '', otherSpec: '',
    carouselInstalled: '', carouselRemoved: '',
    machine: `TR30-${activeMachine}`,
    epr: activeExtractor,
    pos: ['', '', '', '', ''],
    foils: Array.from({ length: 5 }, () => ({
      startDate: '', startTime: '', startRun: '', startOp: '',
      endDate:   '', endTime:   '', endRun:   '', endOp:   '',
      totalDose: '', reason: ''
    }))
  };
}


/* ============================================================
   12. TOAST NOTIFICATION
   Errors stay visible for 5 seconds, normal messages for 3.
   ============================================================ */
let toastTimer = null;
function showToast(message, isError = false) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = isError ? 'show error' : 'show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toast.className = ''; }, isError ? 5000 : 3200);
}


/* ============================================================
   13. RENDER FOIL BLOCKS
   Builds the 5 FOIL entry rows on startup. Uses a custom
   time picker so the format is consistent across all browsers.
   ============================================================ */
function renderFoilBlocks() {
  const container = document.getElementById('foilsContainer');
  container.innerHTML = '';

  for (let i = 0; i < 5; i++) {
    const block = document.createElement('div');
    block.className = 'foil-block';
    block.innerHTML = `
      <div class="foil-title">FOIL #${i + 1}</div>
      <div class="line">
        <span class="lbl foil-lbl">Start Date and Time:</span>
        <input id="foil${i}_startDate" class="foil-date" type="date">
        ${buildTimepicker(`foil${i}_startTime`)}
        <label class="foil-run">Run#: <input id="foil${i}_startRun" class="field" style="width:60px;" type="text"></label>
        <label class="foil-op">Operator: <input id="foil${i}_startOp" class="field" style="width:80px;" type="text"></label>
      </div>
      <div class="line">
        <span class="lbl foil-lbl">End Date and Time:</span>
        <input id="foil${i}_endDate" class="foil-date" type="date">
        ${buildTimepicker(`foil${i}_endTime`)}
        <label class="foil-run">Run#: <input id="foil${i}_endRun" class="field" style="width:60px;" type="text"></label>
        <label class="foil-op">Operator: <input id="foil${i}_endOp" class="field" style="width:80px;" type="text"></label>
      </div>
      <div class="line">
        <span class="lbl" style="min-width:152px;">Total Dose:</span>
        <input id="foil${i}_totalDose" class="field w-lg" type="text">
      </div>
      <div class="line">
        <span class="lbl" style="min-width:152px;">Reason for Change:</span>
        <input id="foil${i}_reason" class="field w-xl" type="text">
      </div>`;
    container.appendChild(block);
  }
}


/* ============================================================
   14. LOAD FORM
   Fills all form fields from a data object.
   ============================================================ */
function loadForm(data) {
  const d = data || buildEmptyForm();

  document.getElementById('totalThickness').value    = d.totalThickness    || '';
  document.getElementById('lotNumber').value         = d.lotNumber         || '';
  document.getElementById('ovenTemp').value          = d.ovenTemp          || '';
  document.getElementById('otherSpec').value         = d.otherSpec         || '';
  document.getElementById('carouselInstalled').value = d.carouselInstalled || '';
  document.getElementById('carouselRemoved').value   = d.carouselRemoved   || '';

  (d.pos || []).forEach((v, i) => {
    const el = document.getElementById(`pos${i + 1}`);
    if (el) el.value = v || '';
  });

  (d.foils || []).forEach((foil, i) => {
    if (i >= 5) return;
    foil = foil || {};
    document.getElementById(`foil${i}_startDate`).value = foil.startDate || '';
    tpSetValue(`foil${i}_startTime`, foil.startTime || '');
    document.getElementById(`foil${i}_startRun`).value  = foil.startRun  || '';
    document.getElementById(`foil${i}_startOp`).value   = foil.startOp   || '';
    document.getElementById(`foil${i}_endDate`).value   = foil.endDate   || '';
    tpSetValue(`foil${i}_endTime`,   foil.endTime   || '');
    document.getElementById(`foil${i}_endRun`).value    = foil.endRun    || '';
    document.getElementById(`foil${i}_endOp`).value     = foil.endOp     || '';
    document.getElementById(`foil${i}_totalDose`).value = foil.totalDose || '';
    document.getElementById(`foil${i}_reason`).value    = foil.reason    || '';
  });
}


/* ============================================================
   15. READ FORM
   Collects all form field values into a data object for saving.
   ============================================================ */
function readForm() {
  const foils = [];
  for (let i = 0; i < 5; i++) {
    foils.push({
      startDate: document.getElementById(`foil${i}_startDate`).value,
      startTime: tpGetValue(`foil${i}_startTime`),
      startRun:  document.getElementById(`foil${i}_startRun`).value,
      startOp:   document.getElementById(`foil${i}_startOp`).value,
      endDate:   document.getElementById(`foil${i}_endDate`).value,
      endTime:   tpGetValue(`foil${i}_endTime`),
      endRun:    document.getElementById(`foil${i}_endRun`).value,
      endOp:     document.getElementById(`foil${i}_endOp`).value,
      totalDose: document.getElementById(`foil${i}_totalDose`).value,
      reason:    document.getElementById(`foil${i}_reason`).value,
    });
  }

  return {
    totalThickness:    document.getElementById('totalThickness').value,
    lotNumber:         document.getElementById('lotNumber').value,
    ovenTemp:          document.getElementById('ovenTemp').value,
    otherSpec:         document.getElementById('otherSpec').value,
    carouselInstalled: document.getElementById('carouselInstalled').value,
    carouselRemoved:   document.getElementById('carouselRemoved').value,
    machine: `TR30-${activeMachine}`,
    epr:     activeExtractor,
    savedAt: new Date().toISOString(),
    pos:     [1,2,3,4,5].map(n => document.getElementById(`pos${n}`).value),
    foils
  };
}


/* ============================================================
   16. AUTO-FILL NEXT FOIL
   When an operator fills in a foil's end date or end run,
   those values are copied into the next foil's start fields
   (only if those fields are empty).
   End time is NOT copied — operators enter start time manually.
   ============================================================ */
function maybeCopyEndDateToNextFoil(index) {
  const next = index + 1;
  if (next >= 5) return;
  const endDate   = document.getElementById(`foil${index}_endDate`).value;
  const nextStart = document.getElementById(`foil${next}_startDate`);
  if (endDate && !nextStart.value) { nextStart.value = endDate; autosave(); }
}

function maybeCopyEndRunToNextFoil(index) {
  const next = index + 1;
  if (next >= 5) return;
  const endRun    = document.getElementById(`foil${index}_endRun`).value;
  const nextStart = document.getElementById(`foil${next}_startRun`);
  if (endRun && !nextStart.value) { nextStart.value = endRun; autosave(); }
}


/* ============================================================
   16b. CUSTOM TIME PICKER
   Renders an hour/minute grid that pops up when the time button
   is clicked. Stored value is always HH:MM in 24-hour format.
   ============================================================ */
const tpHour = {}; // tracks the selected hour for each picker

function buildTimepicker(id) {
  const hours = Array.from({ length: 24 }, (_, h) =>
    `<div class="tp-cell" data-h="${h}" data-id="${id}">${String(h).padStart(2,'0')}</div>`
  ).join('');
  const mins = Array.from({ length: 60 }, (_, m) =>
    `<div class="tp-cell" data-m="${m}" data-id="${id}">${String(m).padStart(2,'0')}</div>`
  ).join('');
  return `
    <div class="tp-wrap">
      <button type="button" class="tp-btn empty" id="tp_${id}_btn">--:--</button>
      <div class="tp-popup" id="tp_${id}_pop">
        <div class="tp-col">
          <div class="tp-col-hdr">Hour</div>
          <div class="tp-grid tp-hr-grid">${hours}</div>
        </div>
        <div class="tp-col">
          <div class="tp-col-hdr">Min</div>
          <div class="tp-grid tp-mn-grid">${mins}</div>
        </div>
      </div>
      <input type="hidden" id="${id}">
    </div>`;
}

function tpSetValue(id, val) {
  const btn    = document.getElementById(`tp_${id}_btn`);
  const hidden = document.getElementById(id);
  if (!btn || !hidden) return;
  if (val) {
    hidden.value = val;
    btn.textContent = val;
    btn.classList.remove('empty');
    tpHour[id] = Number(val.split(':')[0]);
  } else {
    hidden.value = '';
    btn.textContent = '--:--';
    btn.classList.add('empty');
  }
}

function tpGetValue(id) {
  const el = document.getElementById(id);
  return el ? el.value : '';
}

function attachTimepickerListeners() {
  document.addEventListener('click', function(e) {
    // Toggle popup open/close on button click
    const btn = e.target.closest('.tp-btn');
    if (btn) {
      const pop    = btn.parentElement.querySelector('.tp-popup');
      const isOpen = pop.classList.contains('open');
      document.querySelectorAll('.tp-popup.open').forEach(p => p.classList.remove('open'));
      if (!isOpen) pop.classList.add('open');
      return;
    }
    // Hour cell — store selected hour and highlight
    if (e.target.classList.contains('tp-cell') && e.target.dataset.h !== undefined) {
      const id = e.target.dataset.id;
      tpHour[id] = Number(e.target.dataset.h);
      e.target.closest('.tp-hr-grid').querySelectorAll('.tp-cell').forEach(c =>
        c.classList.toggle('selected', c === e.target));
      return;
    }
    // Minute cell — finalise the time value and close picker
    if (e.target.classList.contains('tp-cell') && e.target.dataset.m !== undefined) {
      const id  = e.target.dataset.id;
      const h   = tpHour[id] !== undefined ? tpHour[id] : 0;
      const m   = Number(e.target.dataset.m);
      const val = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      tpSetValue(id, val);
      e.target.closest('.tp-mn-grid').querySelectorAll('.tp-cell').forEach(c =>
        c.classList.toggle('selected', c === e.target));
      e.target.closest('.tp-popup').classList.remove('open');
      autosave();
      // If this is an end time, also try copying the end date to next foil
      const match = id.match(/foil(\d)_endTime/);
      if (match) maybeCopyEndDateToNextFoil(Number(match[1]));
      return;
    }
    // Click anywhere else closes all open pickers
    if (!e.target.closest('.tp-wrap')) {
      document.querySelectorAll('.tp-popup.open').forEach(p => p.classList.remove('open'));
    }
  });
}


/* ============================================================
   17. AUTOSAVE
   Saves the draft 250ms after the operator stops typing.
   Only runs on the draft page, not on saved read-only records.
   ============================================================ */
function autosave() {
  if (pageViewIndex !== 0 && !editModeActive) return;
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(() => saveDraft(readForm()), 250);
}


/* ============================================================
   18. PAGE DATA HELPERS
   pageViewIndex 0 = draft. 1 = most recently saved page.
   Higher numbers go further back in history.
   ============================================================ */
function getViewedPage() {
  if (pageViewIndex === 0) return currentDraft || buildEmptyForm();
  return savedPages[savedPages.length - pageViewIndex] || buildEmptyForm();
}

function getNextPageNumber() {
  if (!savedPages.length) return 1;
  return Math.max(...savedPages.map(p => Number(p.pageNumber) || 0)) + 1;
}


/* ============================================================
   19. EDIT SAVED RECORD
   ============================================================ */
function startEdit() {
  editModeActive = true;
  applyViewState();
  showToast('Editing record — click Save Changes when done.');
}

function cancelEdit() {
  editModeActive = false;
  loadForm(getViewedPage());
  applyViewState();
  showToast('Edit cancelled.');
}

async function saveEdit() {
  const saveIndex = savedPages.length - pageViewIndex;
  const original  = savedPages[saveIndex];
  if (!original) return;

  const updated      = readForm();
  updated.pageNumber = original.pageNumber;
  updated.savedAt    = original.savedAt;
  updated.editedAt   = new Date().toISOString();

  savedPages[saveIndex] = updated;
  await writeSavedPages(savedPages);
  editModeActive = false;
  loadForm(updated);
  applyViewState();
  showToast(`Page ${updated.pageNumber} updated.`);
}


/* ============================================================
   20. VIEW STATE
   Controls which buttons are visible, read-only state,
   and navigation counters. Called any time the view changes.
   ============================================================ */
function applyViewState() {
  const isSaved    = pageViewIndex !== 0;
  const isReadOnly = isSaved && !editModeActive;

  document.getElementById('formSheet').classList.toggle('readonly', isReadOnly);
  document.getElementById('roBadge').classList.toggle('show', isReadOnly);

  const banner = document.getElementById('sheetBanner');
  banner.classList.toggle('show', isSaved);
  banner.classList.toggle('editing', editModeActive);
  banner.textContent = editModeActive
    ? '✏️ Editing Saved Record — click Save Changes when done'
    : '🔒 Read Only — Saved Record';

  document.getElementById('machineLabel').textContent   = `TR30-${activeMachine}`;
  document.getElementById('extractorLabel').textContent = `EPR ${activeExtractor}`;

  // Draft is a separate state, not a numbered page.
  // Only saved records get page numbers in the nav and footer.
  if (pageViewIndex === 0) {
    document.getElementById('navInfo').textContent    = 'Draft';
    document.getElementById('formFooter').textContent = 'Draft';
  } else {
    const page  = savedPages[savedPages.length - pageViewIndex];
    const label = page?.pageNumber || pageViewIndex;
    document.getElementById('navInfo').textContent    = `Page ${label} of ${savedPages.length}`;
    document.getElementById('formFooter').textContent = `Page ${label} of ${savedPages.length}`;
  }

  document.getElementById('prevPageBtn').disabled = pageViewIndex === 0 || editModeActive;
  document.getElementById('nextPageBtn').disabled = pageViewIndex >= savedPages.length || editModeActive;
  document.getElementById('jumpToDraftBtn').style.display = pageViewIndex > 0 ? '' : 'none';

  document.getElementById('savePageBtn').style.display  = !isSaved                  ? '' : 'none';
  document.getElementById('newPageBtn').style.display   = !isSaved                  ? '' : 'none';
  document.getElementById('deletePageBtn').style.display = isSaved && !editModeActive ? '' : 'none';
  document.getElementById('reprintBtn').style.display   = isSaved && !editModeActive ? '' : 'none';
  document.getElementById('editBtn').style.display      = isSaved && !editModeActive ? '' : 'none';
  document.getElementById('cancelEditBtn').style.display = isSaved && editModeActive  ? '' : 'none';
  document.getElementById('saveEditBtn').style.display  = isSaved && editModeActive  ? '' : 'none';

  document.querySelectorAll('#machineToggle button').forEach(btn => {
    btn.classList.toggle('active', Number(btn.dataset.machine) === activeMachine);
  });
  document.querySelectorAll('#extractorToggle button').forEach(btn => {
    btn.classList.toggle('active', Number(btn.dataset.extractor) === activeExtractor);
  });
}


/* ============================================================
   21. NAVIGATION
   ============================================================ */
function changeViewedPage(newIndex) {
  if (newIndex < 0 || newIndex > savedPages.length) return;
  if (editModeActive) return;
  if (pageViewIndex === 0) saveDraft(readForm());
  pageViewIndex = newIndex;
  loadForm(getViewedPage());
  applyViewState();
}


/* ============================================================
   22. SWITCH MACHINE
   Each machine has its own independent set of log data.
   Blocked during edit mode — unsaved edits would be lost.
   ============================================================ */
async function switchMachine(machineNumber) {
  if (machineNumber === activeMachine) return;
  if (editModeActive) {
    if (!confirm('You have unsaved edits. Switch machine and discard them?')) return;
  }
  if (pageViewIndex === 0) saveDraft(readForm());
  activeMachine = machineNumber;
  pageViewIndex = 0;
  editModeActive = false;
  await reloadAllData();
  loadForm(getViewedPage());
  applyViewState();
}


/* ============================================================
   23. SWITCH EXTRACTOR
   Each extractor has its own independent set of log data.
   Blocked during edit mode — unsaved edits would be lost.
   ============================================================ */
async function switchExtractor(extractorNumber) {
  if (extractorNumber === activeExtractor) return;
  if (editModeActive) {
    if (!confirm('You have unsaved edits. Switch extractor and discard them?')) return;
  }
  if (pageViewIndex === 0) saveDraft(readForm());
  activeExtractor = extractorNumber;
  pageViewIndex   = 0;
  editModeActive  = false;
  await reloadAllData();
  loadForm(getViewedPage());
  applyViewState();
}


/* ============================================================
   24. DELETE PAGE
   Only works on saved pages, not the draft.
   ============================================================ */
async function deleteCurrentPage() {
  if (pageViewIndex === 0) return;
  const saveIndex = savedPages.length - pageViewIndex;
  const page      = savedPages[saveIndex];
  if (!page) return;
  const label = page.pageNumber || '(unnumbered)';
  if (!confirm(`Delete page ${label} for TR30-${activeMachine} / EPR-${activeExtractor}? This cannot be undone.`)) return;
  savedPages.splice(saveIndex, 1);
  await writeSavedPages(savedPages);
  if (pageViewIndex > savedPages.length) pageViewIndex = savedPages.length;
  loadForm(getViewedPage());
  applyViewState();
  showToast(`Page ${label} deleted.`);
}


/* ============================================================
   25. SAVE PAGE AND PRINT PDF
   Saves the draft as a completed record, opens the print
   dialog, then shows the saved record as read-only.
   Canceling the print dialog still shows the saved record —
   it is not lost.
   ============================================================ */
async function savePage() {
  const formData = readForm();
  formData.pageNumber = getNextPageNumber();

  savedPages.push(formData);
  await writeSavedPages(savedPages);

  showToast(`Page ${formData.pageNumber} saved. Use "Save to PDF" in the print dialog.`);

  setTimeout(() => {
    window.print();
    // After print (or cancel): clear the draft, then show the saved record.
    // clearDraft() is deferred until here so the state mutation happens in one
    // place at the end of the save cycle, making the flow easier to follow.
    window.addEventListener('afterprint', function handler() {
      window.removeEventListener('afterprint', handler);
      clearDraft();
      pageViewIndex = 1;
      loadForm(getViewedPage());
      applyViewState();
    });
  }, 250);
}


/* ============================================================
   26. PRINT PREPARATION
   Replaces input fields with plain text spans before printing,
   then restores them after.
   ============================================================ */
function prepareForPrint() {
  const selectors = '.sheet input[type="text"], .sheet input[type="date"]';
  document.querySelectorAll(selectors).forEach(input => {
    const span = document.createElement('span');
    span.className = 'print-val';
    span.textContent = input.value || '';
    span.style.cssText = `font-family:Courier Prime,monospace;font-size:inherit;border-bottom:1px solid #999;display:inline-block;min-width:${Math.max(input.offsetWidth || 60, 60)}px;`;
    input.dataset.printReplace = '1';
    input.parentNode.insertBefore(span, input);
    input.style.display = 'none';
  });

  // Replace time picker buttons with plain text spans
  document.querySelectorAll('.sheet .tp-btn').forEach(btn => {
    const span = document.createElement('span');
    span.className = 'print-val';
    span.textContent = btn.textContent || '--:--';
    span.style.cssText = 'font-family:Courier Prime,monospace;font-size:inherit;border-bottom:1px solid #999;display:inline-block;min-width:52px;';
    btn.dataset.printReplace = '1';
    btn.parentNode.insertBefore(span, btn);
    btn.style.display = 'none';
  });
}

function restoreAfterPrint() {
  document.querySelectorAll('.print-val').forEach(s => s.remove());
  document.querySelectorAll('[data-print-replace]').forEach(el => {
    el.style.display = '';
    delete el.dataset.printReplace;
  });
}


/* ============================================================
   27. NEW PAGE
   Clears the draft and starts fresh.
   ============================================================ */
function newPage() {
  if (!confirm('Start a new page? Unsaved draft data will be lost.')) return;
  clearDraft();
  pageViewIndex  = 0;
  editModeActive = false;
  loadForm(currentDraft);
  applyViewState();
  showToast(`New page started — TR30-${activeMachine} / EPR-${activeExtractor}.`);
}


/* ============================================================
   28. EVENT WIRING
   All event listeners are attached here, not in the HTML.
   ============================================================ */
function attachEventListeners() {
  // Navigation
  document.getElementById('prevPageBtn').addEventListener('click', () => changeViewedPage(pageViewIndex - 1));
  document.getElementById('nextPageBtn').addEventListener('click', () => changeViewedPage(pageViewIndex + 1));
  document.getElementById('jumpToDraftBtn').addEventListener('click', () => changeViewedPage(0));

  // Machine and extractor toggles
  document.querySelectorAll('#machineToggle button').forEach(btn => {
    btn.addEventListener('click', () => switchMachine(Number(btn.dataset.machine)));
  });
  document.querySelectorAll('#extractorToggle button').forEach(btn => {
    btn.addEventListener('click', () => switchExtractor(Number(btn.dataset.extractor)));
  });

  // Action buttons
  document.getElementById('deletePageBtn').addEventListener('click', deleteCurrentPage);
  document.getElementById('reprintBtn').addEventListener('click', () => window.print());
  document.getElementById('editBtn').addEventListener('click', startEdit);
  document.getElementById('cancelEditBtn').addEventListener('click', cancelEdit);
  document.getElementById('saveEditBtn').addEventListener('click', saveEdit);
  document.getElementById('printBtn').addEventListener('click', () => window.print());
  document.getElementById('newPageBtn').addEventListener('click', newPage);
  document.getElementById('savePageBtn').addEventListener('click', savePage);

  // Top-level form fields
  // Text fields: fire on input. Date fields: fire on change.
  const textFields = ['totalThickness', 'lotNumber', 'ovenTemp', 'otherSpec', 'pos1', 'pos2', 'pos3', 'pos4', 'pos5'];
  const dateFields = ['carouselInstalled', 'carouselRemoved'];
  textFields.forEach(id => document.getElementById(id).addEventListener('input', autosave));
  dateFields.forEach(id => document.getElementById(id).addEventListener('change', autosave));

  // Foil block fields (wired after renderFoilBlocks creates them)
  for (let i = 0; i < 5; i++) {
    const foilTextFields = [`foil${i}_startRun`, `foil${i}_startOp`, `foil${i}_endRun`, `foil${i}_endOp`, `foil${i}_totalDose`, `foil${i}_reason`];
    const foilDateFields = [`foil${i}_startDate`, `foil${i}_endDate`];
    foilTextFields.forEach(id => document.getElementById(id).addEventListener('input', autosave));
    foilDateFields.forEach(id => document.getElementById(id).addEventListener('change', autosave));

    // Auto-fill end date and end run into next foil's start fields
    document.getElementById(`foil${i}_endDate`).addEventListener('change', () => maybeCopyEndDateToNextFoil(i));
    document.getElementById(`foil${i}_endRun`).addEventListener('change',  () => maybeCopyEndRunToNextFoil(i));
  }

  // Time picker (event delegation — one listener handles all pickers)
  attachTimepickerListeners();

  // Print hooks
  window.addEventListener('beforeprint', prepareForPrint);
  window.addEventListener('afterprint',  restoreAfterPrint);
}


/* ============================================================
   29. APP STARTUP
   ============================================================ */
(async function startApp() {
  renderFoilBlocks();
  attachEventListeners();
  await reloadAllData();
  loadForm(getViewedPage());
  applyViewState();
})();
</script>
</body>
